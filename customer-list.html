<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Ledger | VP MICROFINANCE PRO 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0f19; color: #e2e8f0; }
        .yono-gradient { background: linear-gradient(135deg, #6b21a8 0%, #1e40af 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen bg-[#060814] text-slate-100 flex">

    <aside id="sidebar" class="w-64 glass-card fixed inset-y-0 left-0 z-50 p-4 m-3 rounded-2xl h-[calc(100vh-24px)] transition-transform duration-300 lg:translate-x-0 -translate-x-full lg:static">
        <div class="flex items-center gap-3 px-2 py-4 border-b border-white/5 mb-6">
            <div class="w-8 h-8 rounded-lg yono-gradient flex items-center justify-center text-white font-bold text-sm shadow-md">VP</div>
            <div>
                <h1 class="text-xs font-bold tracking-wider text-white uppercase">VP Microfinance</h1>
                <p class="text-[10px] text-purple-400 font-medium tracking-wide">Pro 2026 Registry</p>
            </div>
        </div>
        <nav class="space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl text-xs font-medium transition-all group">
                <i class="fa-solid fa-chart-pie group-hover:text-purple-400"></i> Dashboard Matrix
            </a>
            <a href="customer-add.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl text-xs font-medium transition-all group">
                <i class="fa-solid fa-user-plus group-hover:text-purple-400"></i> Capital Disbursement
            </a>
            <a href="customer-list.html" class="flex items-center gap-3 px-3 py-2.5 text-white yono-gradient rounded-xl text-xs font-medium shadow-lg transition-all">
                <i class="fa-solid fa-address-book"></i> Customer Ledger
            </a>
        </nav>
    </aside>

    <main class="flex-1 lg:pl-6 p-6 overflow-x-hidden">
        <header class="flex items-center justify-between mb-6 pb-4 border-b border-white/5">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebarLayout()" class="lg:hidden p-2 text-slate-400 hover:text-white glass-card rounded-xl text-xs"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <h2 class="text-base font-semibold text-white tracking-wide">VPM_ Customer List</h2>
                    <p class="text-xs text-slate-400">Enterprise operational data cache pipelines.</p>
                </div>
            </div>
            <button onclick="window.location.href='customer-add.html'" class="px-4 py-2 yono-gradient text-white rounded-xl text-xs font-medium hover:opacity-90 shadow-md flex items-center gap-2">
                <i class="fa-solid fa-plus text-[10px]"></i> Onboard Account
            </button>
        </header>

        <div class="glass-card rounded-2xl border border-white/5 overflow-hidden shadow-2xl">
            <div class="overflow-x-auto w-full">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-white/[0.02] border-b border-white/5 text-[10px] tracking-wider text-slate-400 font-semibold uppercase">
                            <th class="px-6 py-4">Account No</th>
                            <th class="px-6 py-4">Customer Name</th>
                            <th class="px-6 py-4">Schema Plan</th>
                            <th class="px-6 py-4">EMI Installment</th>
                            <th class="px-6 py-4">Total Outstanding</th>
                            <th class="px-6 py-4">Status Token</th>
                            <th class="px-6 py-4 text-right">Operational Engine</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody" class="divide-y divide-white/5 text-xs text-slate-300">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="actionModal" class="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-50 p-4 hidden">
        <div class="glass-card w-full max-w-lg rounded-2xl p-6 border border-white/10 shadow-2xl relative">
            <div class="flex items-center justify-between border-b border-white/5 pb-3 mb-4">
                <h3 id="modalTitle" class="text-xs font-bold tracking-wider uppercase text-purple-400">Registry Workspace</h3>
                <button onclick="closeActionModal()" class="text-slate-400 hover:text-white text-sm transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <form id="modalForm" onsubmit="saveUpdatedCustomerData(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase">Account Number ID</label>
                        <input type="text" id="modalAccountNo" readonly class="w-full px-3 py-2 bg-white/5 border border-slate-700/60 rounded-xl text-purple-300 font-mono font-bold text-xs focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase">Customer Legal Identity</label>
                        <input type="text" id="modalName" required class="w-full px-3 py-2 bg-white/5 border border-slate-700/60 rounded-xl text-white text-xs focus:outline-none focus:border-purple-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase">Mobile Connection Terminal</label>
                        <input type="tel" id="modalMobile" required class="w-full px-3 py-2 bg-white/5 border border-slate-700/60 rounded-xl text-white text-xs focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase">Disbursed Principal (₹)</label>
                        <input type="number" id="modalPrincipal" required class="w-full px-3 py-2 bg-white/5 border border-slate-700/60 rounded-xl text-white text-xs focus:outline-none focus:border-purple-500">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 uppercase">Calculated Installment Valuation (₹)</label>
                    <input type="number" id="modalEMI" required class="w-full px-3 py-2 bg-white/5 border border-slate-700/60 rounded-xl text-emerald-400 font-mono font-bold text-xs focus:outline-none focus:border-purple-500">
                </div>

                <div id="modalActionButtons" class="flex justify-end gap-3 border-t border-white/5 pt-4 mt-6">
                    <button type="button" onclick="closeActionModal()" class="px-4 py-2 bg-white/5 hover:bg-white/10 text-slate-300 rounded-xl text-xs font-medium transition-all">Dismiss View</button>
                    <button type="submit" id="modalSubmitBtn" class="px-5 py-2 yono-gradient text-white rounded-xl text-xs font-medium shadow-md hover:opacity-90 transition-all">Synchronize Parameters</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const CLOUD_SYNC_URL = "https://script.google.com/macros/s/AKfycby9Fwl090NE0lUuVmrgiXvFv_V7UGfg4nD9ZezIhabsuEMwS-8QvjE5lkXxQtD3FSZO/exec";

        function toggleSidebarLayout() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        // 1. Core Dynamic Grid Renderer (Now includes Delete Button Elements)
        function renderActiveLedgerGrid() {
            const tableBody = document.getElementById('customerTableBody');
            if (!tableBody) return;

            let customers = JSON.parse(localStorage.getItem('vp_local_customers')) || [];
            tableBody.innerHTML = '';

            if (customers.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-slate-500 text-xs font-medium"><i class="fa-solid fa-folder-open block text-lg mb-2 text-slate-600"></i> No accounts registered inside local dataset matrix bounds.</td></tr>`;
                return;
            }

            customers.forEach((user) => {
                const cleanEmi = parseFloat(user.emi) || 0;
                const cleanOutstanding = parseFloat(user.totalOutstanding) || 0;

                tableBody.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/[0.01] transition-colors">
                        <td class="px-6 py-4 font-mono font-bold text-purple-400">${user.accountNo || 'VP-N/A'}</td>
                        <td class="px-6 py-4 text-white font-medium">${user.customerName || 'Unknown Identity'}</td>
                        <td class="px-6 py-4 text-slate-400">${user.frequency || 'Monthly'}</td>
                        <td class="px-6 py-4 text-emerald-400 font-semibold font-mono">₹${cleanEmi.toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                        <td class="px-6 py-4 text-amber-400 font-semibold font-mono">₹${cleanOutstanding.toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-0.5 text-[10px] font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/10 rounded-full">Live Connection</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <button onclick="viewProfile('${user.accountNo}')" class="w-7 h-7 flex items-center justify-center bg-white/5 text-slate-300 rounded-lg hover:text-white hover:bg-purple-600/20 transition-all" title="View Profile"><i class="fa-solid fa-eye text-[11px]"></i></button>
                                <button onclick="editProfile('${user.accountNo}')" class="w-7 h-7 flex items-center justify-center bg-white/5 text-slate-300 rounded-lg hover:text-white hover:bg-amber-600/20 transition-all" title="Edit Properties"><i class="fa-solid fa-pen-to-square text-[11px]"></i></button>
                                <button onclick="deleteCustomerProfile('${user.accountNo}')" class="w-7 h-7 flex items-center justify-center bg-white/5 text-rose-400 rounded-lg hover:text-white hover:bg-rose-600/20 transition-all" title="Delete Profile"><i class="fa-solid fa-trash-can text-[11px]"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // 2. View Function Profile Protocol
        function viewProfile(accountNo) {
            let customers = JSON.parse(localStorage.getItem('vp_local_customers')) || [];
            let target = customers.find(c => c.accountNo === accountNo);
            if (!target) return;

            document.getElementById('modalTitle').innerText = `View Account Structure [ ${accountNo} ]`;
            setFieldState(true);
            populateModalData(target);
            document.getElementById('modalSubmitBtn').classList.add('hidden');
            document.getElementById('actionModal').classList.remove('hidden');
        }

        // 3. Edit Profile Form Open Protocol
        function editProfile(accountNo) {
            let customers = JSON.parse(localStorage.getItem('vp_local_customers')) || [];
            let target = customers.find(c => c.accountNo === accountNo);
            if (!target) return;

            document.getElementById('modalTitle').innerText = `Modify Registry Data [ ${accountNo} ]`;
            setFieldState(false);
            populateModalData(target);
            document.getElementById('modalSubmitBtn').classList.remove('hidden');
            document.getElementById('actionModal').classList.remove('hidden');
        }

        // 4. Dynamic Delete Protocol Integration
        function deleteCustomerProfile(accountNo) {
            if (!confirm(`⚠️ Machi, Warning!\nAre you sure you want to delete account: ${accountNo}? This cannot be undone.`)) {
                return;
            }

            let customers = JSON.parse(localStorage.getItem('vp_local_customers')) || [];
            let filteredCustomers = customers.filter(c => c.accountNo !== accountNo);
            
            // Local Cache Cleanup
            localStorage.setItem('vp_local_customers', JSON.stringify(filteredCustomers));
            renderActiveLedgerGrid();

            // Cloud sheet deletion pipeline broadcast handshake
            const syncEndpoint = `${CLOUD_SYNC_URL}?jsonData=${encodeURIComponent(JSON.stringify({ 
                action: 'deleteCustomer', 
                accountNo: accountNo 
            }))}`;

            fetch(syncEndpoint, { method: 'GET', mode: 'cors' })
            .then(res => res.json())
            .then(resData => {
                if(resData.status === 'success') console.log("Cloud log entry deleted!");
            }).catch(err => console.warn("Cloud bypass active:", err));

            alert('🗑️ Clear ah tuple space-la erundhu account details-ah uriviyachu machi! Process Done!');
        }

        // Helper Data Population Core Tools
        function populateModalData(data) {
            document.getElementById('modalAccountNo').value = data.accountNo || '';
            document.getElementById('modalName').value = data.customerName || '';
            document.getElementById('modalMobile').value = data.mobile || '';
            document.getElementById('modalPrincipal').value = data.principal || 0;
            document.getElementById('modalEMI').value = data.emi || 0;
        }

        function setFieldState(isDisabled) {
            document.getElementById('modalName').disabled = isDisabled;
            document.getElementById('modalMobile').disabled = isDisabled;
            document.getElementById('modalPrincipal').disabled = isDisabled;
            document.getElementById('modalEMI').disabled = isDisabled;
        }

        function closeActionModal() {
            document.getElementById('actionModal').classList.add('hidden');
        }

        // 5. Update Pipeline & Local Cache Sync Action
        function saveUpdatedCustomerData(e) {
            e.preventDefault();
            let targetAc = document.getElementById('modalAccountNo').value;
            let customers = JSON.parse(localStorage.getItem('vp_local_customers')) || [];
            
            let targetIdx = customers.findIndex(c => c.accountNo === targetAc);
            if(targetIdx === -1) return;

            // Mapping updated memory payloads
            customers[targetIdx].customerName = document.getElementById('modalName').value;
            customers[targetIdx].mobile = document.getElementById('modalMobile').value;
            customers[targetIdx].principal = parseFloat(document.getElementById('modalPrincipal').value) || 0;
            customers[targetIdx].emi = parseFloat(document.getElementById('modalEMI').value) || 0;

            // Commit back directly to localStorage engine bounds
            localStorage.setItem('vp_local_customers', JSON.stringify(customers));
            renderActiveLedgerGrid();
            closeActionModal();

            // Cloud sheet silent handshake tracking routing parameters URL
            const syncEndpoint = `${CLOUD_SYNC_URL}?jsonData=${encodeURIComponent(JSON.stringify({ 
                action: 'updateCustomer', 
                data: customers[targetIdx] 
            }))}`;

            fetch(syncEndpoint, { method: 'GET', mode: 'cors' })
            .then(res => res.json())
            .then(resData => {
                if(resData.status === 'success') console.log("Cloud server sync operational!");
            }).catch(err => console.warn("Cloud connection latency bypassed:", err));

            alert('🎉 Success Machi! Local memory variables & Sheet background queues updated!');
        }

        // Bootstrapping
        document.addEventListener('DOMContentLoaded', renderActiveLedgerGrid);
    </script>
</body>
</html>
