<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP MICROFINANCE PRO | YONO SBI Edition</title>
    <!-- Google Fonts & Tailwind CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
        }
        .yono-gradient {
            background: linear-gradient(135deg, #6b21a8 0%, #1e40af 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px rgba(255, 255, 255, 0.08) solid;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Decorative Premium Background Orbs -->
    <div class="absolute w-[500px] h-[500px] rounded-full bg-purple-600/10 blur-[120px] -top-20 -left-20 pointer-events-none"></div>
    <div class="absolute w-[600px] h-[600px] rounded-full bg-blue-600/10 blur-[150px] -bottom-40 -right-20 pointer-events-none"></div>

    <!-- Main Container -->
    <div class="w-full max-w-md relative z-10">
        
        <!-- Luxury Branding Container -->
        <div class="flex flex-col items-center mb-8">
            <!-- Company Logo Placeholder (YONO SBI Style) -->
            <div class="w-20 h-20 yono-gradient rounded-full flex items-center justify-center shadow-xl shadow-purple-900/40 border border-white/20 mb-3 animate-pulse">
                <i class="fa-solid fa-building-columns text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide text-center">
                VP <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">MICROFINANCE</span> PRO
            </h1>
            <p class="text-xs text-slate-400 tracking-widest uppercase mt-1">YONO SBI Luxury Edition</p>
        </div>

        <!-- Premium Login Glass Card -->
        <div class="glass-panel w-full rounded-3xl p-8 shadow-2xl relative">
            <div class="absolute top-0 left-0 right-0 h-[2px] yono-gradient rounded-t-3xl"></div>
            
            <h2 class="text-xl font-semibold text-white mb-6">Secure Partner Login</h2>

            <!-- Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
                
                <!-- Username Field -->
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-2 uppercase tracking-wider" for="username">Username / Agent ID</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <i class="fa-regular fa-user"></i>
                        </span>
                        <input 
                            type="text" 
                            id="username" 
                            required
                            placeholder="Enter credentials" 
                            class="w-full pl-11 pr-4 py-3 bg-white/5 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all text-sm"
                        >
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-2 uppercase tracking-wider" for="password">Secure Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input 
                            type="password" 
                            id="password" 
                            required
                            placeholder="••••••••" 
                            class="w-full pl-11 pr-12 py-3 bg-white/5 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all text-sm"
                        >
                        <!-- Toggle Password Visibility -->
                        <button 
                            type="button" 
                            onclick="togglePassword()" 
                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-white transition-colors"
                        >
                            <i id="eyeIcon" class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password Actions -->
                <div class="flex items-center justify-between text-xs pt-1">
                    <label class="flex items-center text-slate-400 cursor-pointer select-none">
                        <input type="checkbox" id="rememberMe" class="rounded bg-white/5 border-slate-700 text-purple-600 focus:ring-0 focus:ring-offset-0 mr-2 w-4 h-4 accent-purple-600">
                        Remember Me
                    </label>
                    <a href="#" onclick="alert('Machi, please contact the Main Branch Administrator to reset your secure key.')" class="text-purple-400 hover:text-purple-300 transition-colors font-medium">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    class="w-full mt-2 py-3.5 yono-gradient text-white rounded-xl font-medium tracking-wide shadow-lg shadow-purple-900/30 hover:opacity-95 active:scale-[0.99] transition-all flex items-center justify-center space-x-2 text-sm"
                >
                    <span>Authorize & Sign In</span>
                    <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </form>
        </div>

        <!-- Footer Notice -->
        <p class="text-center text-[11px] text-slate-500 mt-6 tracking-wide">
            <i class="fa-solid fa-shield-halved mr-1 text-emerald-500"></i> End-to-End Encrypted Node connection secured for 2026.
        </p>
    </div>

    <!-- Simple Login Handler Script -->
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-regular', 'fa-eye');
                eyeIcon.classList.add('fa-solid', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-solid', 'fa-eye-slash');
                eyeIcon.classList.add('fa-regular', 'fa-eye');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            // Ready for Phase 1 - Part 2 integration (index.html redirection)
            alert('Access Granted! Welcome to VP Microfinance Pro.');
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
