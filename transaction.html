    <main class="flex-1 lg:pl-6 p-6 overflow-x-hidden">
        <header class="flex items-center justify-between mb-6 pb-4 border-b border-white/5">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebarLayout()" class="lg:hidden p-2 text-slate-400 hover:text-white glass-card rounded-xl text-xs"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <h2 class="text-base font-semibold text-white tracking-wide">EMI Collection Terminal</h2>

                </div>
            </div>
        </header>

        <div class="w-full max-w-2xl glass-card rounded-2xl border border-white/5 p-6 shadow-2xl mx-auto">
            <form id="transactionForm" onsubmit="executeTransactionCommit(event)" class="space-y-5">
                
                <div class="relative">
                    <label class="block text-[10px] text-purple-400 font-semibold mb-1 uppercase tracking-wider">Search Account Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 text-xs"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" id="searchAccount" autocomplete="off" onfocus="triggerAccountSearchPipeline()" oninput="triggerAccountSearchPipeline()" placeholder="Click or type to search (e.g., VP-102...)" class="w-full pl-9 pr-4 py-2.5 bg-white/5 border border-slate-700/60 rounded-xl text-white font-mono text-xs focus:outline-none focus:border-purple-500 transition-all">
                    </div>
                    <div id="searchDropdown" class="absolute z-50 left-0 right-0 mt-1 bg-[#0f1524] border border-white/10 rounded-xl shadow-2xl hidden max-h-48 overflow-y-auto custom-dropdown">
                        </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase tracking-wider">Customer Legal Identity</label>
                        <input type="text" id="customerName" readonly placeholder="Auto-populated Name" class="w-full px-3 py-2.5 bg-white/[0.02] border border-white/5 rounded-xl text-slate-400 text-xs font-medium focus:outline-none cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase tracking-wider">Disbursed Loan Principal</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-xs">₹</span>
                            <input type="text" id="loanAmount" readonly placeholder="0.00" class="w-full pl-7 pr-3 py-2.5 bg-white/[0.02] border border-white/5 rounded-xl text-slate-400 font-mono text-xs focus:outline-none cursor-not-allowed">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase tracking-wider">Target EMI Valuation</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-emerald-500 text-xs">₹</span>
                            <input type="text" id="emiAmount" readonly placeholder="0.00" class="w-full pl-7 pr-3 py-2.5 bg-white/[0.02] border border-white/5 rounded-xl text-emerald-400 font-mono font-bold text-xs focus:outline-none cursor-not-allowed">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase tracking-wider">Scheduled EMI Repayment Date</label>
                        <input type="text" id="emiDate" readonly placeholder="YYYY-MM-DD" class="w-full px-3 py-2.5 bg-white/[0.02] border border-white/5 rounded-xl text-slate-400 text-xs font-medium focus:outline-none cursor-not-allowed">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                    <div>
                        <label class="block text-[10px] text-amber-400 font-semibold mb-1 uppercase tracking-wider">Payment Mode Channel</label>
                        <select id="paymentMode" required onchange="evaluatePaymentChannelView()" class="w-full px-3 py-2.5 bg-[#0f1524] border border-slate-700/60 rounded-xl text-white text-xs focus:outline-none focus:border-purple-500 transition-all cursor-pointer">
                            <option value="" disabled selected>Select Channel</option>
                            <option value="Cash">Cash</option>
                            <option value="UPI">UPI</option>
                            <option value="Split Payment">Split Payment</option>
                            <option value="NEFT or IMPS">NEFT or IMPS</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-amber-400 font-semibold mb-1 uppercase tracking-wider">Collected Real Amount (₹)</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-white text-xs">₹</span>
                            <input type="number" step="0.01" id="collectedAmount" required placeholder="Type collected amount" class="w-full pl-7 pr-3 py-2.5 bg-white/5 border border-slate-700/60 rounded-xl text-white font-mono font-bold text-xs focus:outline-none focus:border-purple-500 transition-all">
                        </div>
                    </div>
                </div>

                <div id="referenceNoContainer" class="hidden border-t border-white/5 pt-4 transition-all duration-300">
                    <div>
                        <label class="block text-[10px] text-purple-400 font-semibold mb-1 uppercase tracking-wider">Reference No / Txn ID</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 text-xs"><i class="fa-solid fa-receipt"></i></span>
                            <input type="text" id="referenceNo" placeholder="Enter UPI Ref No, UTR, or Transaction ID" class="w-full pl-9 pr-4 py-2.5 bg-white/5 border border-slate-700/60 rounded-xl text-white font-mono text-xs focus:outline-none focus:border-purple-500 transition-all">
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3 border-t border-white/5 pt-4 mt-2">
                    <button type="reset" onclick="clearTransactionTerminal()" class="px-4 py-2.5 bg-white/5 hover:bg-white/10 text-slate-300 rounded-xl text-xs font-medium transition-all">Clear Terminal</button>
                    <button type="submit" class="px-6 py-2.5 yono-gradient text-white rounded-xl text-xs font-bold tracking-wide shadow-lg hover:opacity-90 transition-all flex items-center gap-2">
                        <i class="fa-solid fa-check-double"></i> Authorize Collection Ledger
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const CLOUD_SYNC_URL = "https://script.google.com/macros/s/AKfycby9Fwl090NE0lUuVmrgiXvFv_V7UGfg4nD9ZezIhabsuEMwS-8QvjE5lkXxQtD3FSZO/exec";

        function toggleSidebarLayout() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        // 1. Conditional Layout Logic for Reference Input Field
        function evaluatePaymentChannelView() {
            const currentMode = document.getElementById('paymentMode').value;
            const refContainer = document.getElementById('referenceNoContainer');
            const refInput = document.getElementById('referenceNo');

            if (currentMode === 'UPI' || currentMode === 'Split Payment' || currentMode === 'NEFT or IMPS') {
                refContainer.classList.remove('hidden');
                refInput.required = true;
            } else {
                refContainer.classList.add('hidden');
                refInput.required = false;
                refInput.value = ''; 
            }
        }

        // 2. Global Flexible Array Fallback Search Engine
        function triggerAccountSearchPipeline() {
            const inputVal = document.getElementById('searchAccount').value.toUpperCase().trim();
            const dropdown = document.getElementById('searchDropdown');
            
            // Auto loading customer memory maps
            let customers = JSON.parse(localStorage.getItem('vp_local_customers')) || [];
            
            if (customers.length === 0) {
                dropdown.innerHTML = `<div class="px-4 py-3 text-slate-500 text-xs italic">No registered customers in LocalStorage matrix!</div>`;
                dropdown.classList.remove('hidden');
                return;
            }

            // Filter logic matches everything if input is clean empty focus
            let filtered = customers.filter(c => {
                let currentAcNo = (c.accountNo || c.accountNumber || '').toUpperCase();
                return inputVal === '' || currentAcNo.includes(inputVal);
            });

            if (filtered.length === 0) {
                dropdown.innerHTML = `<div class="px-4 py-3 text-slate-500 text-xs italic">Machi, no matches found!</div>`;
                dropdown.classList.remove('hidden');
                return;
            }

            dropdown.innerHTML = '';
            filtered.forEach(account => {
                let correctAcNo = account.accountNo || account.accountNumber || 'VP-N/A';
                let correctName = account.customerName || account.name || 'Unknown Identity';
                
                const searchRow = document.createElement('div');
                searchRow.className = "px-4 py-2.5 hover:bg-purple-600/20 text-xs border-b border-white/5 cursor-pointer flex justify-between items-center transition-all group";
                searchRow.innerHTML = `
                    <span class="font-mono font-bold text-purple-400 group-hover:text-white">${correctAcNo}</span>
                    <span class="text-slate-400 text-[11px] group-hover:text-slate-200">${correctName}</span>
                `;
                searchRow.onclick = () => selectTargetAccountProfile(account);
                dropdown.appendChild(searchRow);
            });

            dropdown.classList.remove('hidden');
        }

        // 3. Robust Object Property Extraction Handler
        function selectTargetAccountProfile(customer) {
            let correctAcNo = customer.accountNo || customer.accountNumber || 'VP-N/A';
            let correctName = customer.customerName || customer.name || 'N/A';
            let correctPrincipal = customer.principal || customer.loanAmount || customer.amount || 0;
            let correctEmi = customer.emi || customer.emiAmount || 0;
            let correctDate = customer.startDate || customer.date || customer.emiDate || new Date().toISOString().split('T')[0];

            document.getElementById('searchAccount').value = correctAcNo;
            document.getElementById('customerName').value = correctName;
            document.getElementById('loanAmount').value = parseFloat(correctPrincipal).toLocaleString('en-IN', {minimumFractionDigits: 2});
            document.getElementById('emiAmount').value = parseFloat(correctEmi).toFixed(2);
            document.getElementById('emiDate').value = correctDate;
            
            document.getElementById('collectedAmount').value = parseFloat(correctEmi) || '';
            document.getElementById('searchDropdown').classList.add('hidden');
        }

        // Dynamic click listener to dismiss selection panels
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('searchDropdown');
            const searchInput = document.getElementById('searchAccount');
            if (e.target !== dropdown && e.target !== searchInput) {
                dropdown.classList.add('hidden');
            }
        });

        function clearTransactionTerminal() {
            document.getElementById('searchDropdown').classList.add('hidden');
            document.getElementById('referenceNoContainer').classList.add('hidden');
            document.getElementById('transactionForm').reset();
        }

        // 4. Data Sync Processing Pipeline
        function executeTransactionCommit(e) {
            e.preventDefault();
            
            const acNo = document.getElementById('searchAccount').value.trim();
            const name = document.getElementById('customerName').value;
            const mode = document.getElementById('paymentMode').value;
            const amt = parseFloat(document.getElementById('collectedAmount').value) || 0;
            const refNo = document.getElementById('referenceNo').value.trim();

            if(!name || name === 'Auto-populated Name') {
                alert("⚠️ Error Machi! Choose a valid registered account from the list.");
                return;
            }

            let customers = JSON.parse(localStorage.getItem('vp_local_customers')) || [];
            let index = customers.findIndex(c => (c.accountNo || c.accountNumber) === acNo);

            if(index !== -1) {
                let currentOutstanding = parseFloat(customers[index].totalOutstanding || customers[index].outstanding || 0);
                customers[index].totalOutstanding = Math.max(0, currentOutstanding - amt);
                localStorage.setItem('vp_local_customers', JSON.stringify(customers));
            }

            const payload = {
                action: 'saveTransaction',
                data: {
                    accountNo: acNo,
                    customerName: name,
                    paymentMode: mode,
                    amountCollected: amt,
                    referenceNo: refNo || 'N/A (Cash)',
                    timestamp: new Date().toISOString()
                }
            };

            const remoteSyncEndpoint = `${CLOUD_SYNC_URL}?jsonData=${encodeURIComponent(JSON.stringify(payload))}`;

            fetch(remoteSyncEndpoint, { method: 'GET', mode: 'cors' })
            .then(res => res.json())
            .then(resData => {
                if(resData.status === 'success') console.log("Google Sheets logging synchronization active!");
            }).catch(err => console.warn("Cloud connection latency bypassed:", err));

            alert(`✅ Success Machi!\n\nTransaction authorized for ${acNo}.\n₹${amt} via ${mode} logged successfully!\nRef No: ${refNo || 'N/A'}`);
            clearTransactionTerminal();
        }

};

localStorage.setItem('vp_local_transactions', JSON.stringify(existingLogs));




        
    </script>
