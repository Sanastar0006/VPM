<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection Entry Pipeline | VP MICROFINANCE PRO 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0f19; color: #e2e8f0; }
        .yono-gradient { background: linear-gradient(135deg, #6b21a8 0%, #1e40af 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-dropdown::-webkit-scrollbar { width: 4px; }
        .custom-dropdown::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen bg-[#060814] text-slate-100 flex">

    <aside id="sidebar" class="w-64 glass-card fixed inset-y-0 left-0 z-50 p-4 m-3 rounded-2xl h-[calc(100vh-24px)] transition-transform duration-300 lg:translate-x-0 -translate-x-full lg:static">
        <div class="flex items-center gap-3 px-2 py-4 border-b border-white/5 mb-6">
            <div class="w-8 h-8 rounded-lg yono-gradient flex items-center justify-center text-white font-bold text-sm shadow-md">VP</div>
            <div>
                <h1 class="text-xs font-bold tracking-wider text-white uppercase">VP Microfinance</h1>
                <p class="text-[10px] text-purple-400 font-medium tracking-wide">Pro 2026 Registry</p>
            </div>
        </div>
        <nav class="space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl text-xs font-medium transition-all group">
                <i class="fa-solid fa-chart-pie group-hover:text-purple-400"></i> Dashboard Matrix
            </a>
            <a href="customer-add.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl text-xs font-medium transition-all group">
                <i class="fa-solid fa-user-plus group-hover:text-purple-400"></i> Capital Disbursement
            </a>
            <a href="customer-list.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl text-xs font-medium transition-all group">
                <i class="fa-solid fa-address-book"></i> Customer Ledger
            </a>
            <a href="transaction.html" class="flex items-center gap-3 px-3 py-2.5 text-white yono-gradient rounded-xl text-xs font-medium shadow-lg transition-all">
                <i class="fa-solid fa-money-bill-transfer"></i> EMI Collection Terminal
            </a>
        </nav>
    </aside>

    <main class="flex-1 lg:pl-6 p-6 overflow-x-hidden">
        <header class="flex items-center justify-between mb-6 pb-4 border-b border-white/5">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebarLayout()" class="lg:hidden p-2 text-slate-400 hover:text-white glass-card rounded-xl text-xs"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <h2 class="text-base font-semibold text-white tracking-wide">Dynamic Transaction Interface</h2>
                    <p class="text-xs text-slate-400">Real-time ledger handshake pipeline protocols.</p>
                </div>
            </div>
        </header>

        <div class="w-full max-w-2xl glass-card rounded-2xl border border-white/5 p-6 shadow-2xl mx-auto">
            <form id="transactionForm" onsubmit="executeTransactionCommit(event)" class="space-y-5">
                
                <div class="relative">
                    <label class="block text-[10px] text-purple-400 font-semibold mb-1 uppercase tracking-wider">Search Account Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 text-xs"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" id="searchAccount" autocomplete="off" oninput="triggerAccountSearchPipeline()" placeholder="Type to search (e.g., VP-102...)" class="w-full pl-9 pr-4 py-2.5 bg-white/5 border border-slate-700/60 rounded-xl text-white font-mono text-xs focus:outline-none focus:border-purple-500 transition-all">
                    </div>
                    <div id="searchDropdown" class="absolute z-50 left-0 right-0 mt-1 bg-[#0f1524] border border-white/10 rounded-xl shadow-2xl hidden max-h-48 overflow-y-auto custom-dropdown">
                        </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase tracking-wider">Customer Legal Identity</label>
                        <input type="text" id="customerName" readonly placeholder="Auto-populated Name" class="w-full px-3 py-2.5 bg-white/[0.02] border border-white/5 rounded-xl text-slate-400 text-xs font-medium focus:outline-none cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 uppercase tracking-wider">Disbursed Loan Principal</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-xs">₹</span>
                            <input type="text" id
